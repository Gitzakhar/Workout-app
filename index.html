<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
}
header{
    background:#22c55e;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}
.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}
input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:10px;
    font-size:16px;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:14px;
    background:#22c55e;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}
.workout{
    background:#222;
    margin-top:15px;
    padding:15px;
    border-radius:10px;
}
</style>
</head>
<body>

<header>💪 Workout Tracker</header>

<div class="container">

<input id="exercise" placeholder="Exercise">
<input id="sets" type="number" placeholder="Sets">
<input id="reps" type="number" placeholder="Reps">

<button onclick="saveWorkout()">Save Workout</button>

<h2>History</h2>

<div id="history"></div>

</div>

<script>
let workouts = JSON.parse(localStorage.getItem("workouts")) || [];

function saveWorkout(){

const exercise=document.getElementById("exercise").value;
const sets=document.getElementById("sets").value;
const reps=document.getElementById("reps").value;

if(exercise=="") return;

workouts.unshift({
exercise,
sets,
reps,
date:new Date().toLocaleString()
});

localStorage.setItem("workouts",JSON.stringify(workouts));

document.getElementById("exercise").value="";
document.getElementById("sets").value="";
document.getElementById("reps").value="";

display();
}

function display(){

let html="";

for(let w of workouts){

html+=`
<div class="workout">
<b>${w.exercise}</b><br>
${w.sets} sets × ${w.reps} reps<br>
<small>${w.date}</small>
</div>
`;

}

document.getElementById("history").innerHTML=html;

}

display();
</script>

</body>
</html>
