<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAVE HIM! - Pull the Pin</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            touch-action: none;
        }

        /* The Phone Container */
        #game-container {
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 800px;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 100%);
            position: relative;
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* Header UI */
        .header {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        .level-text {
            font-size: 24px;
            color: #FFD700;
            text-shadow: 2px 2px 0 #000;
            animation: pulse 1s infinite;
        }

        /* Game Elements */
        .character {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 60px;
            z-index: 5;
            transition: all 0.5s;
        }

        .danger {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 50px;
            z-index: 5;
        }

        .gold {
            position: absolute;
            bottom: 150px;
            right: 40px;
            font-size: 40px;
            z-index: 5;
        }

        /* The Wall/Pin System */
        .wall {
            position: absolute;
            background-color: #555;
            border: 2px solid #333;
            z-index: 6;
        }

        .pin {
            position: absolute;
            width: 120px;
            height: 20px;
            background-color: #FF4500;
            border-radius: 10px;
            border: 3px solid #fff;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .pin::after {
            content: "PULL";
            font-size: 12px;
            font-weight: bold;
            color: white;
        }

        .pin:hover {
            transform: scale(1.05);
        }

        /* Positioning the specific level */
        #wall-horizontal {
            width: 200px;
            height: 20px;
            top: 250px;
            left: 50%;
            transform: translateX(-50%);
        }

        #pin-1 {
            top: 245px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Fake Download Button */
        .download-btn {
            position: absolute;
            bottom: 20px;
            width: 80%;
            padding: 15px;
            background: linear-gradient(90deg, #00C851, #007E33);
            color: white;
            text-align: center;
            font-size: 20px;
            border-radius: 50px;
            border: 4px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 20;
            animation: bounce 2s infinite;
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        @keyframes fall {
            0% { top: 100px; }
            100% { top: 250px; }
        }

        @keyframes sting {
            0% { transform: translateX(-50%) rotate(0deg); }
            25% { transform: translateX(-60%) rotate(-10deg); }
            50% { transform: translateX(-40%) rotate(10deg); }
            75% { transform: translateX(-50%) rotate(0deg); }
            100% { filter: grayscale(100%); opacity: 0.5; }
        }

        /* Fail Screen */
        #fail-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .fail-text {
            color: red;
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .retry-btn {
            padding: 10px 30px;
            background: white;
            color: black;
            border: none;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
        }

        /* Arrows pointing to pin */
        .arrow {
            position: absolute;
            font-size: 40px;
            color: yellow;
            z-index: 15;
            animation: point 1s infinite;
        }
        
        @keyframes point {
            0% { opacity: 1; transform: translateY(0); }
            50% { opacity: 0.5; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div id="game-container">
        <div class="header">
            <div class="level-text">LEVEL 1</div>
        </div>

        <!-- The Danger -->
        <div class="danger" id="bees">🐝🐝🐝</div>

        <!-- The Wall -->
        <div class="wall" id="wall-horizontal"></div>

        <!-- The Pin -->
        <div class="pin" id="pin-1" onclick="pullPin()"></div>
        
        <!-- Arrows telling you what to do -->
        <div class="arrow" style="top: 200px; left: 20%;">👇</div>
        <div class="arrow" style="top: 200px; right: 20%;">👇</div>

        <!-- The Character -->
        <div class="character" id="hero">😐</div>

        <!-- The Goal -->
        <div class="gold">💰</div>

        <!-- Fake CTA -->
        <div class="download-btn" onclick="alert('This is just a demo!')">INSTALL NOW</div>

        <!-- Fail Screen -->
        <div id="fail-screen">
            <div class="fail-text">FAIL!</div>
            <button class="retry-btn" onclick="resetGame()">TRY AGAIN</button>
        </div>
    </div>

    <script>
        let isFailed = false;

        function pullPin() {
            if (isFailed) return;

            const pin = document.getElementById('pin-1');
            const bees = document.getElementById('bees');
            const hero = document.getElementById('hero');
            const wall = document.getElementById('wall-horizontal');

            // Animate pin removal
            pin.style.transform = "translateX(200px)";
            pin.style.opacity = "0";

            // Remove the wall after a slight delay
            setTimeout(() => {
                wall.style.display = 'none';
                
                // Drop the bees
                bees.style.transition = "top 0.5s ease-in";
                bees.style.top = "250px";

                // Check collision after bees drop
                setTimeout(() => {
                    // In these fake ads, the physics are always broken.
                    // Even though there is gold to the side, the bees hit the guy.
                    hero.innerText = "😵";
                    hero.style.animation = "sting 0.5s forwards";
                    
                    setTimeout(() => {
                        showFail();
                    }, 600);
                }, 500);
            }, 200);
        }

        function showFail() {
            isFailed = true;
            document.getElementById('fail-screen').style.display = 'flex';
        }

        function resetGame() {
            isFailed = false;
            document.getElementById('fail-screen').style.display = 'none';
            
            // Reset elements
            const pin = document.getElementById('pin-1');
            const bees = document.getElementById('bees');
            const hero = document.getElementById('hero');
            const wall = document.getElementById('wall-horizontal');

            pin.style.transform = "translateX(-50%)";
            pin.style.opacity = "1";
            
            bees.style.transition = "none";
            bees.style.top = "100px";
            
            wall.style.display = 'block';
            
            hero.innerText = "😐";
            hero.style.animation = "none";
            hero.style.filter = "none";
            hero.style.opacity = "1";
        }
    </script>
</body>
</html>
